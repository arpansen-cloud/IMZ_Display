<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>IMZ Country Screen</title>
    <link rel="stylesheet" href="../shared/styles.css" />
</head>
<body>
<div id="app">
    <div id="bg"></div>
    <div class="overlay"></div>

    <div class="content">
        <div class="top">
            <div>
                <div class="title" id="title"></div>
                <div class="subtitle" id="subtitle"></div>
            </div>
            <div class="badge" id="badge"></div>
        </div>

        <div class="middle" id="points"></div>

        <div class="bottom">
            <div class="cta" id="cta"></div>

            <div class="footer">
                <div id="footLeft"></div>
                <div class="progress" id="dots"></div>
                <div id="footRight"></div>
            </div>
        </div>
    </div>

    <script src="../shared/slideshow.js"></script>
</div>
</body>
</html>

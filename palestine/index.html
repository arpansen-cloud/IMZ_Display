<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Palestine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:ital,wght@0,400;0,700;1,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../shared/styles.css?v=10" />
</head>
<body>
<div id="app">
  <div id="bgTexture"></div>
  <div class="screen-noise"></div>
  <div class="page-shell">
    <header class="hero">
      <div class="title-wrap">
        <div class="title" id="title"></div>
        <div class="subtitle" id="subtitle"></div>
      </div>
      <div class="logo" aria-label="MSA logo">
        <img src="../shared/gt-msa-logo.png" alt="GT MSA logo" />
        <span id="logoLabel">MSA</span>
      </div>
    </header>
    <main class="columns">
      <section>
        <h2 class="section-title">What's Happening</h2>
        <article class="content-block"><h3>Background</h3><p id="backgroundText"></p></article>
        <article class="content-block"><h3>Parties Involved</h3><ul class="party-list" id="parties"></ul></article>
        <article class="content-block"><h3>Timeline</h3><div class="timeline" id="timeline"></div></article>
        <figure class="media-card"><img id="leftImage" alt="" /></figure>
      </section>
      <section>
        <h2 class="section-title">Civilian Impact</h2>
        <article class="content-block"><h3>Experiences</h3><p id="impactText"></p></article>
        <div class="stats-grid" id="stats"></div>
        <figure class="media-card"><img id="middleImage" alt="" /></figure>
      </section>
      <section>
        <h2 class="section-title">How to Help</h2>
        <article class="content-block"><p id="helpText"></p></article>
        <div class="qr-grid" id="helpCards"></div>
        <article class="content-block learn-more"><h3>Learn More</h3><p id="learnMoreText"></p></article>
        <figure class="media-card"><img id="rightImage" alt="" /></figure>
      </section>
    </main>
    <footer class="footer"><div class="pager" id="dots"></div><div class="slide-count" id="slideCount"></div></footer>
  </div>
  <script src="../shared/slideshow.js?v=2"></script>
</div>
</body>
</html>
